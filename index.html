<html lang="zh-TW">

        /* 標題區塊 */
        .header { 
            margin-bottom: 20px; padding: 30px 15px; 
            background: linear-gradient(135deg, #A62C2B 0%, #801C1B 100%); 
            border-radius: 16px; color: #F5E6BE; 
            box-shadow: 0 10px 30px rgba(166, 44, 43, 0.2);
            display: flex; align-items: center; justify-content: center; gap: 20px; 
        }
        .header img { 
            width: 100px; height: auto; border-radius: 12px;
            border: 3px solid #F5E6BE; background: white; padding: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .header-text { text-align: left; }
        .header h1 { font-size: 32px; letter-spacing: 5px; margin-bottom: 4px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { font-size: 14px; letter-spacing: 2px; opacity: 0.9; }
        
        /* API 設定區 */
        .api-config {
            background: #fdf2f2; padding: 15px; border-radius: 12px; border: 1px solid #ebccd1;
            margin-bottom: 20px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
            box-shadow: 0 4px 10px rgba(166, 44, 43, 0.05);
        }
        .api-group { flex: 1; min-width: 250px; display: flex; align-items: center; gap: 8px; }
        .api-config label { font-weight: bold; color: #a62c2b; font-size: 13px; white-space: nowrap; }
        .api-config input { flex: 1; padding: 10px; border: 1px solid #d1c4b2; border-radius: 8px; font-size: 14px; }
        .help-box { width: 100%; font-size: 12px; color: #7b5e26; background: #fff8e1; padding: 12px; border-radius: 8px; border-left: 5px solid #ffc107; margin-top: 5px; }

        /* 輸入區塊 */
        .input-section { background: #FFFFFF; padding: 20px; border-radius: 12px; border: 2px solid #A62C2B; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-section h2 { color: #A62C2B; margin-bottom: 20px; font-size: 20px; border-left: 5px solid #A62C2B; padding-left: 12px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: bold; margin-bottom: 6px; color: #555; font-size: 14px; }
        .form-group input, .form-group select { padding: 12px; border: 1px solid #D1C4B2; border-radius: 8px; font-size: 15px; background-color: #fff; }
        
        .btn-calculate { background-color: #A62C2B; color: #F5E6BE; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; padding: 15px 20px; cursor: pointer; transition: 0.3s; width: 100%; letter-spacing: 2px; }
        .btn-calculate:active { transform: scale(0.98); background-color: #801C1B; }
        
        /* 命盤圖形 */
        .result-section { display: none; }
        .result-section.active { display: block; animation: fadeIn 0.8s ease-out; }
        
        .chart-container { 
            background: #F4EBE2; border-radius: 16px; padding: 15px; margin-bottom: 30px; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05); 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch;
        }
        .chart-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); 
            gap: 8px; min-width: 850px; max-width: 1000px; margin: 0 auto; 
        }
        
        .palace { background: #FFF8F2; border: 1.5px solid #A62C2B; border-radius: 8px; padding: 8px; min-height: 190px; position: relative; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden;}
        .palace.life-palace { background: #FFF0F0; border-width: 3px; border-color: #A62C2B; }
        .palace-top { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #E0D5C1; padding-bottom: 4px; margin-bottom: 6px; }
        .palace-name { font-weight: bold; font-size: 18px; color: #A62C2B; }
        .body-tag { font-size: 11px; color: #D4AF37; font-weight: bold; background: #FFF; padding: 1px 4px; border-radius: 4px; border: 1px solid #D4AF37; }

        .palace-main { flex-grow: 1; display: flex; gap: 4px; }

        .star-item { display: flex; align-items: center; gap: 2px; }
        .star-brightness { font-size: 10px; color: #8E7341; font-weight: normal; }
        
        .sec-stars { width: 40%; font-size: 11px; color: #666; text-align: right; display: flex; flex-direction: column; gap: 1px; }
        
        .palace-bottom { display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid #E0D5C1; padding-top: 4px; margin-top: 4px; }
        .palace-si-hua { font-size: 9px; color: #8E7341; font-weight: bold; max-width: 60%; line-height: 1.1; }
        .stem-branch { font-size: 16px; font-weight: bold; color: #8E7341; }
        .age-range { font-size: 10px; color: #777; font-family: Consolas, monospace; display: block; }
        
        .center-palace { background: white; border: 4px double #A62C2B; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 42px; color: #A62C2B; font-weight: bold; grid-column: span 2; grid-row: span 2; letter-spacing: 15px; line-height: 1.3; text-align: center;}
        
        /* 分析報告 */
        .analysis-content { background: #FFFEFA; padding: 25px 15px; border-radius: 16px; border: 1px solid #E0D5C1; max-width: 1000px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .analysis-header { text-align: center; margin-bottom: 25px; border-bottom: 4px solid #A62C2B; padding-bottom: 10px; }
        .analysis-header h2 { color: #A62C2B; font-size: 26px; letter-spacing: 4px; }
        
        .section-title { color: #FFF; background: #A62C2B; padding: 12px 20px; border-radius: 10px 10px 0 0; font-size: 19px; letter-spacing: 2px;}
        .section-content { background: #FFF; border: 1px solid #A62C2B; padding: 20px 15px; border-radius: 0 0 10px 10px; line-height: 1.8; font-size: 16px; margin-bottom: 30px; }
        
        .quote { color: #7B5E26; font-style: italic; border-bottom: 2px solid #FDFBEE; padding-bottom: 10px; margin-bottom: 20px; font-size: 18px; text-align: center; font-weight: 500;}
        
        .analysis-item { margin-bottom: 25px; border-bottom: 1px dashed #E0D5C1; padding-bottom: 15px; }
        .analysis-item b { color: #A62C2B; font-size: 18px; display: block; margin-bottom: 10px; border-left: 6px solid #A62C2B; padding-left: 12px; }
        
        .info-box { background-color: #FDFBEE; padding: 15px; border-radius: 12px; border: 1px solid #D4AF37; margin-bottom: 25px; }
        .info-box table { width: 100%; font-size: 15px; border-collapse: collapse; }
        .info-box td { padding: 5px; }
        .highlight { color: #A62C2B; font-weight: bold; }
        
        /* AI 區塊 */
        .ai-section { margin-top: 30px; padding: 20px; background: #fdf2f2; border: 2px dashed #A62C2B; border-radius: 16px; }
        .ai-btn { background: #A62C2B; color: #F5E6BE; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        .progress-container { width: 100%; background: #E0D5C1; height: 10px; border-radius: 10px; overflow: hidden; margin: 15px 0; display: none; border: 1px solid #A62C2B; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #A62C2B 0%, #D4AF37 100%); transition: width 0.4s ease; }
        .ai-result { background: white; padding: 15px; border-radius: 8px; min-height: 80px; line-height: 1.7; color: #444; border: 1px solid #E0D5C1; white-space: pre-wrap; font-size: 15px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .header h1 { font-size: 28px; }
            .info-box td { display: block; width: 100%; padding: 2px 0; }
        }
    </style>
</head>

        function solarToLunar(y, m, d) {
            const baseDate = new Date(1900, 0, 31);
            const objDate = new Date(y, m - 1, d);
            let offset = Math.round((objDate.getTime() - baseDate.getTime()) / 86400000);
            let lYear, daysInYear;
            for (lYear = 1900; lYear < 2101 && offset > 0; lYear++) {
                daysInYear = 0;
                for (let i = 0x8000; i > 0x8; i >>= 1) { daysInYear += (LUNAR_DATA[lYear - 1900] & i) ? 30 : 29; }
                if (LUNAR_DATA[lYear - 1900] & 0xf) { daysInYear += (LUNAR_DATA[lYear - 1900] & 0x10000) ? 30 : 29; }
                if (offset < daysInYear) break;
                offset -= daysInYear;
            }
            const leapM = LUNAR_DATA[lYear - 1900] & 0xf;
            let isLeapNow = false, finalMonth = 1;
            for (let i = 1; i <= 12; i++) {
                let tempDays = (LUNAR_DATA[lYear - 1900] & (0x8000 >> (i - 1))) ? 30 : 29;
                if (leapM > 0 && i === (leapM + 1) && !isLeapNow) {
                    let leapDays = (LUNAR_DATA[lYear - 1900] & 0x10000) ? 30 : 29;
                    if (offset < leapDays) return [lYear, leapM, offset + 1, true];
                    offset -= leapDays; isLeapNow = true; i--; continue;
                }
                if (offset < tempDays) { finalMonth = i; break; }
                offset -= tempDays;
            }
            return [lYear, finalMonth, offset + 1, false];
        }

                'ngrok-skip-browser-warning': 'true' 
            };
            if (key) headers['Authorization'] = `Bearer ${key}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ model: "local-model", messages: [{ role: "user", content: prompt }], stream: true })
                });

                if (!response.ok) {
                    throw new Error(`連線失敗 (${response.status})。請檢查 LM Studio 是否啟動並加載模型。`);
                }

                const reader = response.body.getReader(), decoder = new TextDecoder();
                let full = "";
                while (true) {
                    const { done, value } = await reader.read(); if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split("\n");
                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            const dataStr = line.slice(6).trim();
                            if (dataStr === "[DONE]") break;
                            try {
                                const d = JSON.parse(dataStr);

                                if (content) { full += content; resDiv.innerHTML = full.replace(/\n/g, "<br>"); }

                        }
                    }
                }
            } catch (error) { resDiv.innerHTML = `<span style="color:red;">❌ 推演失敗: ${error.message}</span>`; }
            finally { aiBtn.disabled = false; }
        }

        function runAnalysis() {
            const name = document.getElementById('name').value || "緣主";
            const year = parseInt(document.getElementById('year').value);
            const month = parseInt(document.getElementById('month').value);
            const day = parseInt(document.getElementById('day').value);
            const hourIdx = parseInt(document.getElementById('hour').value);
            if (!year || year < 1900 || year > 2100) { alert("年份錯誤"); return; }
            const lDate = solarToLunar(year, month, day);
            const engine = new ZiWeiEngine();
            const { palaces, lifePos } = engine.calculateChart(lDate[0], lDate[1], lDate[2], hourIdx);
            currentPalaces = palaces; renderChart(palaces); renderAnalysis(name, lDate, palaces, lifePos);
            document.getElementById('result').classList.add('active');
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }

        function initDaysLogic() {
            const dSel = document.getElementById('day');
            const m = parseInt(document.getElementById('month').value), y = parseInt(document.getElementById('year').value);
            const days = new Date(y, m, 0).getDate();
            const currentDay = parseInt(dSel.value) || 1;
            dSel.innerHTML = '';
            for (let i = 1; i <= days; i++) { 
                const opt = document.createElement('option'); opt.value = i; opt.textContent = i + '日'; 
                if(i === currentDay) opt.selected = true;
                dSel.appendChild(opt); 
            }
        }
        document.getElementById('month').addEventListener('change', initDaysLogic);
        document.getElementById('year').addEventListener('change', initDaysLogic);
        initDaysLogic();
    </script>
</body>
</html>
